{% extends "base.html" %}
{% block content %}

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Persona</h2>
    </div>

    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow">
                <div class="card-body p-5">
                    <form method="post">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre *</label>
                                <input type="text" name="nombre" class="form-control" value="{{ persona.nombre }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Apellido *</label>
                                <input type="text" name="apellido" class="form-control" value="{{ persona.apellido }}" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">DPI</label>
                                <input type="text" name="dpi" class="form-control" value="{{ persona.dpi or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" name="telefono" class="form-control" value="{{ persona.telefono or '' }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo Institucional</label>
                            <input type="email" name="correo_institucional" class="form-control" value="{{ persona.correo_institucional or '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo Personal</label>
                            <input type="email" name="correo_personal" class="form-control" value="{{ persona.correo_personal or '' }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Estado</label>
                            <select name="estado" class="form-select">
                                <option value="activo" {% if persona.estado == 'activo' %}selected{% endif %}>Activo</option>
                                <option value="inactivo" {% if persona.estado == 'inactivo' %}selected{% endif %}>Inactivo</option>
                                <option value="restringido" {% if persona.estado == 'restringido' %}selected{% endif %}>Restringido</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar Cambios
                            </button>
                            <a href="{{ url_for('personas_list') }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
