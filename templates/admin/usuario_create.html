{% extends "base.html" %}
{% block content %}

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="bi bi-shield-plus"></i> Crear Nuevo Usuario</h2>
    </div>

    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card shadow">
                <div class="card-body p-5">
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Seleccionar Persona *</label>
                            <select name="id_persona" class="form-select" required>
                                <option value="">-- Seleccionar --</option>
                                {% for p in personas_sin_usuario %}
                                <option value="{{ p.id_persona }}">
                                    {{ p.nombre }} {{ p.apellido }} ({{ p.carnet or 'S/C' }})
                                </option>
                                {% endfor %}
                            </select>
                            <small class="text-muted">Solo se muestran personas sin usuario</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username *</label>
                            <input type="text" name="username" class="form-control" placeholder="ej: usuario123" required>
                            <small class="text-muted">Debe ser único en el sistema</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Contraseña *</label>
                            <input type="password" name="password" class="form-control" placeholder="Mínimo 4 caracteres" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-plus-circle"></i> Crear Usuario
                            </button>
                            <a href="{{ url_for('usuarios_list') }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
